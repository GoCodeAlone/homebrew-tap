name: Update wfctl Formula

on:
  repository_dispatch:
    types: [update-wfctl]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Update wfctl formula
      env:
        VERSION: ${{ github.event.client_payload.version }}
      run: |
        set -euo pipefail

        # Strip v prefix for formula version
        FORMULA_VERSION="${VERSION#v}"

        # Download checksums from the release
        CHECKSUMS_URL="https://github.com/GoCodeAlone/workflow/releases/download/${VERSION}/checksums.txt"
        curl -sL "$CHECKSUMS_URL" -o checksums.txt

        # Extract SHA256 for each wfctl binary
        SHA_DARWIN_AMD64=$(grep "wfctl-darwin-amd64$" checksums.txt | awk '{print $1}')
        SHA_DARWIN_ARM64=$(grep "wfctl-darwin-arm64$" checksums.txt | awk '{print $1}')
        SHA_LINUX_AMD64=$(grep "wfctl-linux-amd64$" checksums.txt | awk '{print $1}')
        SHA_LINUX_ARM64=$(grep "wfctl-linux-arm64$" checksums.txt | awk '{print $1}')
        test -n "$SHA_DARWIN_AMD64"
        test -n "$SHA_DARWIN_ARM64"
        test -n "$SHA_LINUX_AMD64"
        test -n "$SHA_LINUX_ARM64"

        # Generate the formula
        cat > Formula/wfctl.rb << RUBY
        class Wfctl < Formula
          desc "CLI for the workflow orchestration engine — validate, inspect, deploy, and manage configs"
          homepage "https://github.com/GoCodeAlone/workflow"
          version "${FORMULA_VERSION}"
          license "Apache-2.0"

          on_macos do
            on_intel do
              url "https://github.com/GoCodeAlone/workflow/releases/download/v#{version}/wfctl-darwin-amd64"
              sha256 "${SHA_DARWIN_AMD64}"
            end
            on_arm do
              url "https://github.com/GoCodeAlone/workflow/releases/download/v#{version}/wfctl-darwin-arm64"
              sha256 "${SHA_DARWIN_ARM64}"
            end
          end

          on_linux do
            on_intel do
              url "https://github.com/GoCodeAlone/workflow/releases/download/v#{version}/wfctl-linux-amd64"
              sha256 "${SHA_LINUX_AMD64}"
            end
            on_arm do
              url "https://github.com/GoCodeAlone/workflow/releases/download/v#{version}/wfctl-linux-arm64"
              sha256 "${SHA_LINUX_ARM64}"
            end
          end

          def install
            cpu = Hardware::CPU.intel? ? "amd64" : "arm64"
            os = OS.mac? ? "darwin" : "linux"
            bin.install "wfctl-#{os}-#{cpu}" => "wfctl"
          end

          def post_install
            if OS.mac?
              system "codesign", "--force", "--sign", "-", "#{bin}/wfctl"
            end
          end

          test do
            assert_match "wfctl", shell_output("#{bin}/wfctl --help 2>&1", 0)
          end
        end
        RUBY

        # Remove leading whitespace from heredoc
        sed -i 's/^        //' Formula/wfctl.rb

    - name: Open update pull request
      env:
        GH_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
        VERSION: ${{ github.event.client_payload.version }}
      run: |
        set -euo pipefail

        BRANCH="automation/update-wfctl-${VERSION}"
        git config user.name "goreleaserbot"
        git config user.email "bot@goreleaser.com"
        git checkout -B "$BRANCH"
        git add Formula/wfctl.rb
        git diff --cached --quiet && echo "No changes" && exit 0
        git commit -m "chore: update wfctl to ${VERSION}"
        git push --force-with-lease --set-upstream origin "$BRANCH"

        BODY="Automated wfctl Homebrew formula update for ${VERSION}."
        if PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq .number 2>/dev/null); then
          gh pr edit "$PR_NUMBER" \
            --title "chore: update wfctl to ${VERSION}" \
            --body "$BODY"
        else
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update wfctl to ${VERSION}" \
            --body "$BODY")
          PR_NUMBER="${PR_URL##*/}"
        fi

        gh pr edit "$PR_NUMBER" --add-reviewer copilot-pull-request-reviewer || true
        if ! gh pr merge "$PR_NUMBER" --auto --squash --delete-branch; then
          echo "::warning::Auto-merge unavailable for wfctl update PR #${PR_NUMBER}; will poll checks and admin-merge."
        fi

        review_threads_query="$(cat <<'GRAPHQL'
          query($owner:String!, $repo:String!, $number:Int!, $cursor:String) {
            repository(owner:$owner, name:$repo) {
              pullRequest(number:$number) {
                reviewThreads(first:100, after:$cursor) {
                  nodes { isResolved }
                  pageInfo { hasNextPage endCursor }
                }
              }
            }
          }
        GRAPHQL
        )"
        for attempt in $(seq 1 60); do
          pr_state="$(gh pr view "$PR_NUMBER" --json state --jq .state)"
          [ "$pr_state" != "MERGED" ] || exit 0

          if ! checks="$(gh pr checks "$PR_NUMBER" --json name,bucket,state,link 2>/dev/null)"; then
            echo "wfctl update PR #${PR_NUMBER}: checks not available yet; poll ${attempt}/60"
            sleep 20
            continue
          fi
          total_checks="$(jq 'length' <<< "$checks")"
          if [ "$total_checks" = "0" ]; then
            echo "wfctl update PR #${PR_NUMBER}: no checks attached yet; poll ${attempt}/60"
            sleep 20
            continue
          fi
          failed="$(jq '[.[] | select(.bucket == "fail")] | length' <<< "$checks")"
          pending="$(jq '[.[] | select(.bucket == "pending")] | length' <<< "$checks")"
          if [ "$failed" != "0" ]; then
            jq -r '.[] | select(.bucket == "fail") | [.name,.state,.link] | @tsv' <<< "$checks"
            exit 1
          fi
          if [ "$pending" = "0" ]; then
            unresolved_threads=0
            cursor=""
            while :; do
              args=(-f owner="${GITHUB_REPOSITORY_OWNER}" -f repo="${GITHUB_REPOSITORY#*/}" -F number="$PR_NUMBER" -f query="$review_threads_query")
              if [ -n "$cursor" ]; then
                args+=(-f cursor="$cursor")
              fi
              thread_page="$(gh api graphql "${args[@]}")"
              page_unresolved="$(jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length' <<< "$thread_page")"
              unresolved_threads=$((unresolved_threads + page_unresolved))
              has_next="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage' <<< "$thread_page")"
              [ "$has_next" = "true" ] || break
              cursor="$(jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor' <<< "$thread_page")"
            done
            if [ "$unresolved_threads" != "0" ]; then
              echo "::warning::wfctl update PR #${PR_NUMBER} has unresolved review threads; leaving it open."
              exit 0
            fi
            gh pr merge "$PR_NUMBER" --squash --admin --delete-branch
            exit 0
          fi
          echo "wfctl update PR #${PR_NUMBER}: checks pending (${pending}); poll ${attempt}/60"
          sleep 20
        done
        echo "::error::Timed out waiting for wfctl update PR #${PR_NUMBER} checks."
        exit 1
